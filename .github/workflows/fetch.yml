name: 定时抓取活动信息

on:
  schedule:
    # UTC时间 00:00 和 12:00，对应北京时间 08:00 和 20:00
    - cron: '0 0,12 * * *'
  workflow_dispatch: {}   # 允许在GitHub网页上手动点击"立即运行"

permissions:
  contents: write   # 需要这个权限才能把抓到的新数据提交回仓库

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install requests beautifulsoup4 playwright
          python -m playwright install --with-deps chromium

      - name: 执行抓取脚本
        run: python fetch.py

      - name: 把新数据提交回仓库
        run: |
          git config user.name "event-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet && echo "没有新内容，跳过提交" || git commit -m "自动更新活动数据 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
