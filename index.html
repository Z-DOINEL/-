<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活动清单</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#05070A; --card:rgba(255,255,255,0.05); --card-solid:#161C22;
    --ink:#EDEAE1; --ink-soft:#9B9689; --ink-faint:#635E54;
    --border:rgba(255,255,255,0.09); --border-strong:rgba(255,255,255,0.22);
    --accent:#4FBFB8; --accent-dim:rgba(79,191,184,0.15); --amber:#E3A63E;
  }
  *{box-sizing:border-box;}
  body{margin:0;
    background:
      radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 75% 8%, rgba(255,255,255,0.35), transparent),
      radial-gradient(1.5px 1.5px at 40% 65%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 90% 45%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 60% 85%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 25% 92%, rgba(255,255,255,0.35), transparent),
      radial-gradient(900px 500px at 50% 0%, #131A20 0%, transparent 60%),
      radial-gradient(1400px 900px at 50% 100%, #0A0E12 0%, var(--bg) 70%);
    background-color:var(--bg);
    color:var(--ink);font-family:'Nunito',-apple-system,"Microsoft YaHei",sans-serif;
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; min-height:100vh;}
  header{padding:30px 28px 22px;}
  header h1{margin:0;font-family:'Quicksand',sans-serif;font-size:29px;font-weight:700;letter-spacing:-0.01em;color:var(--ink);}
  header .meta{font-size:13px;color:var(--ink-faint);margin-top:6px;font-weight:600;}
  #main{max-width:720px;margin:0 auto;padding:6px 18px 60px;}
  .toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
  .toolbar button{
    position:relative; overflow:hidden; isolation:isolate;
    border:1px solid var(--border); background:var(--card);
    backdrop-filter:blur(24px) saturate(180%); -webkit-backdrop-filter:blur(24px) saturate(180%);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.08);
    border-radius:13px; padding:14.5px 27px;
    font-size:17px; font-weight:700; font-family:'Nunito',sans-serif; cursor:pointer; color:var(--ink);
    transition:border-color .3s cubic-bezier(.22,1,.36,1), box-shadow .3s cubic-bezier(.22,1,.36,1), transform .3s cubic-bezier(.22,1,.36,1), background .3s cubic-bezier(.22,1,.36,1), color .3s ease;
  }
  .toolbar button::before{
    content:''; position:absolute; inset:0; z-index:-1; border-radius:inherit;
    background:radial-gradient(160px circle at var(--mx,50%) var(--my,50%), rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.1) 35%, rgba(255,255,255,0.03) 60%, transparent 82%);
    opacity:0; transition:opacity .5s ease;
  }
  .toolbar button:hover{
    border-color:var(--border-strong); transform:translateY(-3px) scale(1.02);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.1), 0 12px 28px rgba(0,0,0,0.4);
  }
  .toolbar button:hover::before{ opacity:1; }
  .toolbar button:active{transform:translateY(-1px) scale(0.97); transition-duration:.12s;}
  .toolbar button.active{
    background:linear-gradient(135deg, rgba(79,191,184,0.4), rgba(79,191,184,0.22));
    color:#EAFBF9; border:2px solid #4FBFB8;
    padding:14px 26px; box-shadow:0 0 0 4px rgba(79,191,184,0.22), 0 6px 22px rgba(79,191,184,0.35);
    font-weight:800;
  }
  .view-label{
    display:inline-flex; align-items:center; gap:8px; font-size:13px; font-weight:700; color:var(--ink-faint);
    margin-bottom:14px; padding:6px 4px;
  }
  .view-label .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);}
  .row{
    display:flex; align-items:center; gap:12px; background:var(--card); border:1px solid var(--border);
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border-radius:13px; padding:15px 16px; margin-bottom:9px;
    transition:box-shadow .35s cubic-bezier(.22,1,.36,1), transform .35s cubic-bezier(.22,1,.36,1), border-color .35s ease, background .35s ease;
  }
  .row:hover{
    box-shadow:0 14px 34px rgba(0,0,0,0.4); transform:translateY(-3px) scale(1.008);
    border-color:var(--border-strong); background:rgba(255,255,255,0.075);
  }
  .envelope{flex-shrink:0;cursor:pointer;width:23px;height:23px;transition:transform .2s ease;}
  .envelope:hover{transform:scale(1.15);}
  .check-icon .ring{fill:none; stroke:#E3A63E; stroke-width:1.9; transition:fill .4s ease, stroke .4s ease;}
  .check-icon .dot{fill:#E3A63E; transition:opacity .3s ease, transform .35s cubic-bezier(.4,0,.2,1); transform-origin:center; transform-box:fill-box;}
  .check-icon .tick{
    stroke:#0A1414; stroke-width:2.3; fill:none; stroke-dasharray:14; stroke-dashoffset:14; opacity:0;
    transition:stroke-dashoffset .4s cubic-bezier(.4,0,.2,1) .05s, opacity .15s ease;
  }
  .check-icon.is-read .ring{fill:#4FBFB8; stroke:#4FBFB8;}
  .check-icon.is-read .dot{opacity:0; transform:scale(0);}
  .check-icon.is-read .tick{stroke-dashoffset:0; opacity:1;}
  .title-wrap{flex:1;min-width:0;}
  .title-wrap a{font-size:16px;font-weight:700;color:var(--ink);text-decoration:none;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .row.read .title-wrap a{font-weight:600;color:var(--ink-soft);}
  .title-wrap .src{font-size:12px;color:var(--ink-faint);margin-top:3px;font-weight:600;}
  .date{flex-shrink:0;font-size:13.5px;color:var(--ink-soft);font-variant-numeric:tabular-nums;font-weight:700;}
  .star{flex-shrink:0;cursor:pointer;width:21px;height:21px;transition:transform .2s ease;position:relative;}
  .star:hover{transform:scale(1.2);}
  .fav-icon .star-outline{stroke:#635E54; transition:stroke .35s ease;}
  .fav-icon .star-fill{fill:#E3A63E; opacity:0; transition:opacity .35s ease;}
  .fav-icon.is-fav .star-fill{opacity:1;}
  .fav-icon.is-fav .star-outline{stroke:#E3A63E;}
  .bloom{position:absolute; inset:0; pointer-events:none;}
  .bloom .ring{
    position:absolute; top:50%; left:50%; width:21px; height:21px; margin:-10.5px 0 0 -10.5px;
    border-radius:50%; border:1.5px solid #E3A63E; opacity:0; transform:scale(0.3);
  }
  .bloom.burst .ring{ animation:ringPulse .55s cubic-bezier(.22,1,.36,1) forwards; }
  @keyframes ringPulse{0%{opacity:0.8; transform:scale(0.3);}100%{opacity:0; transform:scale(2.6);}}
  .bloom i{
    position:absolute; top:50%; left:50%; width:4px; height:4px; margin:-2px 0 0 -2px;
    border-radius:50%; background:#E3A63E; opacity:0; transform:scale(0);
  }
  .bloom i.spark{background:#FFE1A8; width:3px; height:3px; margin:-1.5px 0 0 -1.5px;}
  .bloom.burst i{ animation:bloomPetal .7s cubic-bezier(.22,1,.36,1) forwards; }
  .bloom i:nth-child(2){--ang:0deg; --dist:22px;}
  .bloom i:nth-child(3){--ang:36deg; --dist:26px; animation-delay:.015s;}
  .bloom i:nth-child(4){--ang:72deg; --dist:20px; animation-delay:.03s;}
  .bloom i:nth-child(5){--ang:108deg; --dist:25px; animation-delay:.015s;}
  .bloom i:nth-child(6){--ang:144deg; --dist:21px;}
  .bloom i:nth-child(7){--ang:180deg; --dist:24px; animation-delay:.03s;}
  .bloom i:nth-child(8){--ang:216deg; --dist:20px; animation-delay:.015s;}
  .bloom i:nth-child(9){--ang:252deg; --dist:26px;}
  .bloom i:nth-child(10){--ang:288deg; --dist:22px; animation-delay:.03s;}
  .bloom i:nth-child(11){--ang:324deg; --dist:25px; animation-delay:.015s;}
  @keyframes bloomPetal{
    0%{opacity:1; transform:rotate(var(--ang)) translateX(0) scale(0.3);}
    45%{opacity:1; transform:rotate(var(--ang)) translateX(var(--dist)) scale(1.2);}
    100%{opacity:0; transform:rotate(var(--ang)) translateX(calc(var(--dist) + 6px)) scale(0.4);}
  }
  .star.bursting{animation:starGlowPulse .55s ease;}
  @keyframes starGlowPulse{
    0%{filter:drop-shadow(0 0 0 rgba(227,166,62,0));}
    35%{filter:drop-shadow(0 0 12px rgba(227,166,62,0.9));}
    100%{filter:drop-shadow(0 0 0 rgba(227,166,62,0));}
  }
  .empty-state{text-align:center;padding:60px 20px;color:var(--ink-faint);font-size:14px;}
  .del-btn{flex-shrink:0;cursor:pointer;width:20px;height:20px;opacity:0.45;color:var(--ink-faint);transition:opacity .3s cubic-bezier(.22,1,.36,1), transform .3s cubic-bezier(.22,1,.36,1), color .3s ease;}
  .del-btn:hover{opacity:1; transform:scale(1.35); color:#E5726B; filter:drop-shadow(0 0 8px rgba(229,114,106,0.7));}
  .bin-lid{transition:transform .3s cubic-bezier(.34,1.56,.64,1); transform-origin:5px 7px;}
  .del-btn:hover .bin-lid{transform:rotate(-32deg) translateY(-0.5px);}
  .restore-btn{
    flex-shrink:0; cursor:pointer; width:34px; height:34px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; color:var(--ink-soft);
    border:1px solid var(--border); background:rgba(255,255,255,0.03);
    transition:all .25s cubic-bezier(.34,1.56,.64,1);
  }
  .restore-btn svg{width:17px;height:17px;}
  .restore-btn:hover{
    color:var(--accent); border-color:rgba(79,191,184,0.4); background:var(--accent-dim);
    transform:rotate(-90deg) scale(1.12);
  }
</style>
</head>
<body>
<header>
  <h1>活动清单</h1>
  <div class="meta" id="last-run">加载中…</div>
</header>
<div id="main">
  <div class="toolbar">
    <button id="filter-all" class="active" onclick="setFilter('all')">全部</button>
    <button id="filter-unread" onclick="toggleFilter('unread')">未读</button>
    <button id="filter-fav" onclick="toggleFilter('fav')">收藏</button>
    <button id="filter-trash" onclick="toggleFilter('trash')" style="position:relative;">
      回收站<span id="trash-badge" style="display:none;position:absolute;top:-6px;right:-6px;background:var(--amber);color:#1a1206;font-size:11px;font-weight:800;border-radius:10px;padding:1px 6px;"></span>
    </button>
  </div>
  <div id="view-label" class="view-label"><span class="dot"></span>当前查看：全部</div>
  <div id="list"></div>
</div>

<script>
const READ_KEY = 'event-tracker-read-ids';
const TRASH_KEY = 'event-tracker-trash-ids';
const FAV_KEY = 'event-tracker-fav-ids';
const VIEW_LABELS = { all:'当前查看：全部', unread:'当前查看：未读', fav:'当前查看：收藏', trash:'当前查看：回收站' };
let currentFilter = 'all';
let allItems = [];
let justToggledFavId = null;

function getSet(key){
  try{ return new Set(JSON.parse(localStorage.getItem(key) || '[]')); }
  catch(e){ return new Set(); }
}
function saveSet(key, set){
  localStorage.setItem(key, JSON.stringify([...set]));
}
let readIds = getSet(READ_KEY);
let favIds = getSet(FAV_KEY);
let trashIds = getSet(TRASH_KEY);
function updateTrashBadge(){
  const badge = document.getElementById('trash-badge');
  if(trashIds.size > 0){ badge.style.display = 'inline-block'; badge.textContent = trashIds.size; }
  else{ badge.style.display = 'none'; }
}

function envelopeIcon(isRead){
  return `<svg class="check-icon ${isRead?'is-read':''}" viewBox="0 0 24 24" fill="none">
    <circle class="ring" cx="12" cy="12" r="9.2"/>
    <circle class="dot" cx="12" cy="12" r="3.4"/>
    <path class="tick" d="M7.3 12.3l3 3L16.9 8.8" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}
function starIcon(isFav){
  return `<svg class="fav-icon ${isFav?'is-fav':''}" viewBox="0 0 24 24">
    <path class="star-outline" d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z" fill="none" stroke-width="1.6"/>
    <path class="star-fill" d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"/>
  </svg>`;
}

function formatDate(pubDateStr, fallbackIso){
  let d = pubDateStr ? new Date(pubDateStr) : null;
  if(!d || isNaN(d)) d = fallbackIso ? new Date(fallbackIso) : null;
  if(!d || isNaN(d)) return '未知日期';
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}/${m}/${day}`;
}

async function loadData(){
  try{
    const res = await fetch('data.json?_=' + Date.now());
    const data = await res.json();
    allItems = data.items || [];
    document.getElementById('last-run').textContent = data.last_run
      ? ('最近抓取时间：' + new Date(data.last_run).toLocaleString('zh-CN'))
      : '还没有抓取记录';
  }catch(e){
    document.getElementById('last-run').textContent = '数据加载失败，请稍后刷新重试';
  }
  updateTrashBadge();
  render();
}

function setFilter(f){
  currentFilter = f;
  ['all','unread','fav','trash'].forEach(x=>document.getElementById('filter-'+x).classList.toggle('active', x===f));
  document.getElementById('view-label').innerHTML = `<span class="dot"></span>${VIEW_LABELS[f] || ''}`;
  render();
}
function toggleFilter(f){ setFilter(currentFilter === f ? 'all' : f); }

function toggleRead(id){
  if(readIds.has(id)) readIds.delete(id); else readIds.add(id);
  saveSet(READ_KEY, readIds);
  applyReadVisual(id);
}
function applyReadVisual(id){
  const rowEl = document.querySelector(`.row[data-id="${id}"]`);
  if(!rowEl){ render(); return; }
  const isRead = readIds.has(id);
  const iconEl = rowEl.querySelector('.check-icon');
  if(iconEl) iconEl.classList.toggle('is-read', isRead);
  rowEl.classList.toggle('read', isRead);
  if(currentFilter === 'unread'){ setTimeout(render, 420); }
}
function toggleFav(id){
  if(favIds.has(id)) favIds.delete(id); else favIds.add(id);
  const justBecameFav = favIds.has(id);
  saveSet(FAV_KEY, favIds);
  applyFavVisual(id, justBecameFav);
}
function applyFavVisual(id, justBecameFav){
  const rowEl = document.querySelector(`.row[data-id="${id}"]`);
  if(!rowEl){ render(); return; }
  const iconEl = rowEl.querySelector('.fav-icon');
  if(iconEl) iconEl.classList.toggle('is-fav', favIds.has(id));
  if(justBecameFav){
    const starEl = rowEl.querySelector('.star');
    const bloomEl = rowEl.querySelector('.bloom');
    if(bloomEl){ bloomEl.classList.remove('burst'); void bloomEl.offsetWidth; bloomEl.classList.add('burst'); }
    if(starEl){ starEl.classList.remove('bursting'); void starEl.offsetWidth; starEl.classList.add('bursting'); }
  }
  if(currentFilter === 'fav'){ setTimeout(render, 420); }
}
function openItem(id, link){
  readIds.add(id);
  saveSet(READ_KEY, readIds);
  window.open(link, '_blank', 'noopener,noreferrer');
  applyReadVisual(id);
}

function render(){
  if(currentFilter === 'trash'){ renderTrashView(); return; }

  let items = [...allItems].filter(it => !trashIds.has(it.id));
  items.sort((a,b) => (b.pub_date||b.first_seen||'').localeCompare(a.pub_date||a.first_seen||''));
  if(currentFilter === 'unread') items = items.filter(it => !readIds.has(it.id));
  if(currentFilter === 'fav') items = items.filter(it => favIds.has(it.id));

  const list = document.getElementById('list');
  if(!items.length){
    list.innerHTML = '<div class="empty-state">这里暂时没有内容</div>';
    return;
  }
  list.innerHTML = items.map(it => {
    const isRead = readIds.has(it.id);
    const isFav = favIds.has(it.id);
    return `
      <div class="row ${isRead?'read':''}" data-id="${it.id}">
        <span class="envelope" onclick="toggleRead('${it.id}')" title="标记已读/未读">${envelopeIcon(isRead)}</span>
        <div class="title-wrap">
          <a href="${escapeHtml(it.link)}" onclick="openItem('${it.id}','${escapeHtml(it.link)}'); return false;">${escapeHtml(it.title)}</a>
          <div class="src">${escapeHtml(it.source||'')}</div>
        </div>
        <span class="date">${formatDate(it.pub_date, it.first_seen)}</span>
        <span class="star" onclick="toggleFav('${it.id}')" title="收藏/取消收藏">${starIcon(isFav)}<span class="bloom"><span class="ring"></span><i></i><i></i><i></i><i></i><i></i><i></i><i class="spark"></i><i class="spark"></i><i class="spark"></i><i class="spark"></i></span></span>
        <span class="del-btn" onclick="deleteItem('${it.id}')" title="删除这条（会移入回收站）">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path class="bin-body" d="M6 10v9a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-9"/>
            <path class="bin-body" d="M10 13.5v4.5M14 13.5v4.5"/>
            <g class="bin-lid"><path d="M4 7h16"/><path d="M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></g>
          </svg>
        </span>
      </div>
    `;
  }).join('');
}

function renderTrashView(){
  const items = allItems.filter(it => trashIds.has(it.id))
    .sort((a,b) => (b.pub_date||b.first_seen||'').localeCompare(a.pub_date||a.first_seen||''));
  const list = document.getElementById('list');
  if(!items.length){
    list.innerHTML = '<div class="empty-state">回收站是空的</div>';
    return;
  }
  list.innerHTML = items.map(it => `
    <div class="row read" id="trash-row-${it.id}">
      <span class="envelope" style="opacity:0.5;">${envelopeIcon(true)}</span>
      <div class="title-wrap">
        <a href="${escapeHtml(it.link)}" target="_blank" rel="noopener noreferrer" style="color:var(--ink-soft);">${escapeHtml(it.title)}</a>
        <div class="src">${escapeHtml(it.source||'')} · 已删除</div>
      </div>
      <span class="date">${formatDate(it.pub_date, it.first_seen)}</span>
      <span class="restore-btn" onclick="restoreItem('${it.id}')" title="恢复这条">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
      </span>
    </div>
  `).join('');
}

function deleteItem(id){
  trashIds.add(id);
  saveSet(TRASH_KEY, trashIds);
  updateTrashBadge();
  render();
}
function restoreItem(id){
  const rowEl = document.getElementById('trash-row-' + id);
  const doRestore = () => {
    trashIds.delete(id);
    saveSet(TRASH_KEY, trashIds);
    updateTrashBadge();
    render();
  };
  if(rowEl){
    rowEl.style.transition = 'opacity .3s ease, transform .3s ease';
    rowEl.style.opacity = '0';
    rowEl.style.transform = 'translateX(30px) scale(0.9)';
    setTimeout(doRestore, 300);
  } else {
    doRestore();
  }
}

function escapeHtml(str){
  return (str||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

document.addEventListener('mousemove', (e) => {
  const btn = e.target.closest('button');
  if(btn){
    const rect = btn.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 100;
    const y = ((e.clientY - rect.top) / rect.height) * 100;
    btn.style.setProperty('--mx', x + '%');
    btn.style.setProperty('--my', y + '%');
  }
});

loadData();
</script>
</body>
</html>
