<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活动清单</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#05070A; --card:rgba(255,255,255,0.05); --card-solid:#161C22;
    --ink:#EDEAE1; --ink-soft:#9B9689; --ink-faint:#635E54;
    --border:rgba(255,255,255,0.09); --border-strong:rgba(255,255,255,0.22);
    --accent:#4FBFB8; --accent-dim:rgba(79,191,184,0.15); --amber:#E3A63E;
  }
  *{box-sizing:border-box;}
  body{margin:0;
    background:
      radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 75% 8%, rgba(255,255,255,0.35), transparent),
      radial-gradient(1.5px 1.5px at 40% 65%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 90% 45%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 60% 85%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 25% 92%, rgba(255,255,255,0.35), transparent),
      radial-gradient(900px 500px at 50% 0%, #131A20 0%, transparent 60%),
      radial-gradient(1400px 900px at 50% 100%, #0A0E12 0%, var(--bg) 70%);
    background-color:var(--bg);
    color:var(--ink);font-family:'Nunito',-apple-system,"Microsoft YaHei",sans-serif;
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; min-height:100vh;}
  header{padding:30px 28px 22px;}
  header h1{margin:0;font-family:'Quicksand',sans-serif;font-size:29px;font-weight:700;letter-spacing:-0.01em;color:var(--ink);}
  header .meta{font-size:13px;color:var(--ink-faint);margin-top:6px;font-weight:600;}
  #main{max-width:720px;margin:0 auto;padding:6px 18px 60px;position:relative;}
  .toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center;position:relative;}
  .search-row{position:relative; margin-bottom:14px; display:flex; gap:10px; align-items:center;}
  .icon-only{
    width:50px !important; height:50px; padding:0 !important; display:flex !important;
    align-items:center; justify-content:center; border-radius:50% !important;
  }
  .icon-only svg{width:21px;height:21px;}
  @keyframes spinRefresh{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
  .icon-only.spinning svg{animation:spinRefresh .9s linear infinite;}

  /* 统一的图标按钮悬浮提示 */
  [data-tooltip]{position:relative;}
  [data-tooltip]::after{
    content:attr(data-tooltip); position:absolute; bottom:calc(100% + 10px); left:50%;
    transform:translateX(-50%) translateY(4px); background:var(--card-solid); color:var(--ink);
    font-size:12px; font-weight:600; padding:6px 11px; border-radius:8px; white-space:nowrap;
    opacity:0; pointer-events:none; transition:opacity .2s ease, transform .2s ease;
    border:1px solid var(--border-strong); box-shadow:0 10px 24px rgba(0,0,0,0.45); z-index:60;
  }
  [data-tooltip]:hover::after{opacity:1; transform:translateX(-50%) translateY(0);}
  [data-tooltip].tooltip-left::after{left:auto; right:calc(100% + 10px); bottom:50%; transform:translateY(50%) translateX(4px);}
  [data-tooltip].tooltip-left:hover::after{transform:translateY(50%) translateX(0);}

  .toolbar button, .cfg-row button, .search-row button{
    position:relative; overflow:hidden; isolation:isolate;
    border:1px solid var(--border); background:var(--card);
    backdrop-filter:blur(24px) saturate(180%); -webkit-backdrop-filter:blur(24px) saturate(180%);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.08);
    border-radius:13px; padding:14.5px 27px;
    font-size:17px; font-weight:700; font-family:'Nunito',sans-serif; cursor:pointer; color:var(--ink);
    transition:border-color .3s cubic-bezier(.22,1,.36,1), box-shadow .3s cubic-bezier(.22,1,.36,1), transform .3s cubic-bezier(.22,1,.36,1), background .3s cubic-bezier(.22,1,.36,1), color .3s ease; letter-spacing:0;
  }
  .toolbar button::before, .cfg-row button::before, .search-row button::before{
    content:''; position:absolute; inset:0; z-index:-1; border-radius:inherit;
    background:radial-gradient(160px circle at var(--mx,50%) var(--my,50%), rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.1) 35%, rgba(255,255,255,0.03) 60%, transparent 82%);
    opacity:0; transition:opacity .5s ease;
  }
  .toolbar button:hover, .cfg-row button:hover, .search-row button:hover{
    border-color:var(--border-strong); transform:translateY(-3px) scale(1.02);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.1), 0 12px 28px rgba(0,0,0,0.4);
  }
  .toolbar button:hover::before, .cfg-row button:hover::before, .search-row button:hover::before{ opacity:1; }
  .toolbar button:active, .search-row button:active{transform:translateY(-1px) scale(0.97); transition-duration:.12s;}
  .toolbar button.active{
    background:linear-gradient(135deg, rgba(79,191,184,0.4), rgba(79,191,184,0.22));
    color:#EAFBF9; border:2px solid #4FBFB8;
    padding:14px 26px; box-shadow:0 0 0 4px rgba(79,191,184,0.22), 0 6px 22px rgba(79,191,184,0.35);
    font-weight:800;
  }
  .toolbar button.primary{background:rgba(227,166,62,0.14); color:var(--amber); border-color:rgba(227,166,62,0.35);}

  .search-btn{
    display:flex !important; align-items:center; gap:12px; justify-content:flex-start !important;
    flex:1; min-width:280px; max-width:460px; background:rgba(255,255,255,0.035) !important;
    border-radius:26px !important; padding:17px 28px !important;
  }
  .search-btn svg{width:20px;height:20px;color:var(--ink-faint);flex-shrink:0;}
  .search-btn span{color:var(--ink-faint); font-weight:600; font-size:17px;}
  .search-btn:hover span, .search-btn:hover svg{color:var(--ink-soft);}

  .row{
    display:flex; align-items:center; gap:12px; background:var(--card); border:1px solid var(--border);
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border-radius:13px; padding:15px 16px; margin-bottom:9px;
    transition:box-shadow .35s cubic-bezier(.22,1,.36,1), transform .35s cubic-bezier(.22,1,.36,1), border-color .35s ease, background .35s ease;
  }
  .row:hover{
    box-shadow:0 14px 34px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.03);
    transform:translateY(-3px) scale(1.008); border-color:var(--border-strong);
    background:rgba(255,255,255,0.075);
  }
  .envelope{flex-shrink:0;cursor:pointer;width:23px;height:23px;transition:transform .2s ease;}
  .envelope:hover{transform:scale(1.15);}
  .check-icon .ring{fill:none; stroke:#E3A63E; stroke-width:1.9; transition:fill .4s ease, stroke .4s ease;}
  .check-icon .dot{fill:#E3A63E; transition:opacity .3s ease, transform .35s cubic-bezier(.4,0,.2,1); transform-origin:center; transform-box:fill-box;}
  .check-icon .tick{
    stroke:#0A1414; stroke-width:2.3; fill:none; stroke-dasharray:14; stroke-dashoffset:14; opacity:0;
    transition:stroke-dashoffset .4s cubic-bezier(.4,0,.2,1) .05s, opacity .15s ease;
  }
  .check-icon.is-read .ring{fill:#4FBFB8; stroke:#4FBFB8;}
  .check-icon.is-read .dot{opacity:0; transform:scale(0);}
  .check-icon.is-read .tick{stroke-dashoffset:0; opacity:1;}
  .title-wrap{flex:1;min-width:0;}
  .title-wrap a{font-size:16px;font-weight:700;color:var(--ink);text-decoration:none;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .row.read .title-wrap a{font-weight:600;color:var(--ink-soft);}
  .title-wrap .src{font-size:12px;color:var(--ink-faint);margin-top:3px;font-weight:600;}
  .date{flex-shrink:0;font-size:13.5px;color:var(--ink-soft);font-variant-numeric:tabular-nums;font-weight:700;}
  .star{flex-shrink:0;cursor:pointer;width:21px;height:21px;transition:transform .2s ease;position:relative;}
  .star:hover{transform:scale(1.2);}
  .bloom{position:absolute; inset:0; pointer-events:none;}
  .bloom .ring{
    position:absolute; top:50%; left:50%; width:21px; height:21px; margin:-10.5px 0 0 -10.5px;
    border-radius:50%; border:1.5px solid #E3A63E; opacity:0; transform:scale(0.3);
  }
  .bloom.burst .ring{ animation:ringPulse .55s cubic-bezier(.22,1,.36,1) forwards; }
  @keyframes ringPulse{
    0%{opacity:0.8; transform:scale(0.3);}
    100%{opacity:0; transform:scale(2.6);}
  }
  .bloom i{
    position:absolute; top:50%; left:50%; width:4px; height:4px; margin:-2px 0 0 -2px;
    border-radius:50%; background:#E3A63E; opacity:0; transform:scale(0);
  }
  .bloom i.spark{background:#FFE1A8; width:3px; height:3px; margin:-1.5px 0 0 -1.5px;}
  .bloom.burst i{ animation:bloomPetal .7s cubic-bezier(.22,1,.36,1) forwards; }
  .bloom i:nth-child(2){--ang:0deg;   --dist:22px; animation-delay:0s;}
  .bloom i:nth-child(3){--ang:36deg;  --dist:26px; animation-delay:.015s;}
  .bloom i:nth-child(4){--ang:72deg;  --dist:20px; animation-delay:.03s;}
  .bloom i:nth-child(5){--ang:108deg; --dist:25px; animation-delay:.015s;}
  .bloom i:nth-child(6){--ang:144deg; --dist:21px; animation-delay:0s;}
  .bloom i:nth-child(7){--ang:180deg; --dist:24px; animation-delay:.03s;}
  .bloom i:nth-child(8){--ang:216deg; --dist:20px; animation-delay:.015s;}
  .bloom i:nth-child(9){--ang:252deg; --dist:26px; animation-delay:0s;}
  .bloom i:nth-child(10){--ang:288deg; --dist:22px; animation-delay:.03s;}
  .bloom i:nth-child(11){--ang:324deg; --dist:25px; animation-delay:.015s;}
  @keyframes bloomPetal{
    0%{opacity:1; transform:rotate(var(--ang)) translateX(0) scale(0.3);}
    45%{opacity:1; transform:rotate(var(--ang)) translateX(var(--dist)) scale(1.2);}
    100%{opacity:0; transform:rotate(var(--ang)) translateX(calc(var(--dist) + 6px)) scale(0.4);}
  }
  .star.bursting{animation:starGlowPulse .55s ease;}
  @keyframes starGlowPulse{
    0%{filter:drop-shadow(0 0 0 rgba(227,166,62,0));}
    35%{filter:drop-shadow(0 0 12px rgba(227,166,62,0.9));}
    100%{filter:drop-shadow(0 0 0 rgba(227,166,62,0));}
  }
  .fav-icon .star-outline{stroke:#635E54; transition:stroke .35s ease;}
  .fav-icon .star-fill{fill:#E3A63E; opacity:0; transition:opacity .35s ease;}
  .fav-icon.is-fav .star-fill{opacity:1;}
  .fav-icon.is-fav .star-outline{stroke:#E3A63E;}
  .del-btn{flex-shrink:0;cursor:pointer;width:20px;height:20px;opacity:0.45;color:var(--ink-faint);transition:opacity .3s cubic-bezier(.22,1,.36,1), transform .3s cubic-bezier(.22,1,.36,1), color .3s ease;}
  .del-btn:hover{opacity:1; transform:scale(1.35); color:#E5726B; filter:drop-shadow(0 0 8px rgba(229,114,106,0.7));}
  .bin-lid{transition:transform .3s cubic-bezier(.34,1.56,.64,1); transform-origin:5px 7px;}
  .del-btn:hover .bin-lid{transform:rotate(-32deg) translateY(-0.5px);}
  .restore-btn{
    flex-shrink:0; cursor:pointer; width:34px; height:34px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; color:var(--ink-soft);
    border:1px solid var(--border); background:rgba(255,255,255,0.03);
    transition:all .25s cubic-bezier(.34,1.56,.64,1);
  }
  .restore-btn svg{width:17px;height:17px;}
  .restore-btn:hover{
    color:var(--accent); border-color:rgba(79,191,184,0.4); background:var(--accent-dim);
    transform:rotate(-90deg) scale(1.12);
  }
  .trash-row{opacity:0.85; transition:opacity .3s ease, transform .3s ease, max-height .3s ease;}
  .trash-row.restoring{opacity:0; transform:translateX(30px) scale(0.9);}
  .empty-state{text-align:center;padding:60px 20px;color:var(--ink-faint);font-size:14px;}

  /* 弹窗：悬浮盖在内容上面，不推挤下面的列表；开合用类似水滴收缩/放大的弹性动画 */
  #config-panel{
    display:none; opacity:0; transform:scale(0.85); transform-origin:top left;
    background:var(--card-solid); border:1px solid var(--border-strong); border-radius:15px; padding:18px;
    position:absolute; top:calc(100% + 12px); z-index:20; width:min(360px, calc(100% - 36px));
    transition:opacity .3s cubic-bezier(.34,1.56,.64,1), transform .38s cubic-bezier(.34,1.56,.64,1);
    box-shadow:0 20px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
    backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  }
  #config-panel.open{display:block; opacity:1; transform:scale(1);}
  .diag-panel{
    display:none; opacity:0; transform:scale(0.92) translateY(-6px); transform-origin:top center;
    background:rgba(227,90,90,0.12); border:1px solid rgba(227,90,90,0.35); border-radius:13px;
    padding:14px 16px; font-size:12.5px; line-height:1.6; color:#E58A8A; backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px); position:absolute; left:0; right:0; z-index:15;
    box-shadow:0 16px 40px rgba(0,0,0,0.4); transition:opacity .3s cubic-bezier(.34,1.56,.64,1), transform .38s cubic-bezier(.34,1.56,.64,1);
  }
  .diag-panel.open{display:block; opacity:1; transform:scale(1) translateY(0);}
  .view-label{
    display:inline-flex; align-items:center; gap:8px; font-size:13px; font-weight:700; color:var(--ink-faint);
    margin-bottom:14px; padding:6px 4px;
  }
  .view-label .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);}
  #config-panel::before{
    content:''; position:absolute; top:-7px; left:var(--pointer-left, 40px); width:12px; height:12px;
    background:var(--card-solid); border-left:1px solid var(--border-strong); border-top:1px solid var(--border-strong);
    transform:rotate(45deg);
  }
  .cfg-row{display:flex;gap:8px;margin-bottom:7px;align-items:center;}
  .cfg-row input{flex:1;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--ink);border-radius:9px;padding:9px 11px;font-size:14px;font-family:'Nunito',sans-serif;}
  .cfg-row input:focus{outline:none;border-color:var(--accent);}
  .cfg-row button{padding:8px 13px;font-size:13px;font-weight:700;}
  .cfg-title{font-size:13px;font-weight:700;color:var(--ink-soft);margin:10px 0 8px;}
  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card-solid);border:1px solid var(--border-strong);color:var(--ink);padding:12px 22px;border-radius:11px;font-size:14px;font-weight:600;opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;z-index:99;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .confirm-overlay{
    display:none; position:fixed; inset:0; background:rgba(2,4,5,0.6); backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px); z-index:200; align-items:center; justify-content:center;
    opacity:0; transition:opacity .25s ease;
  }
  .confirm-overlay.show{display:flex; opacity:1;}
  .confirm-box{
    background:var(--card-solid); border:1px solid var(--border-strong); border-radius:16px;
    padding:26px 26px 20px; width:min(340px, 86vw); box-shadow:0 24px 60px rgba(0,0,0,0.55);
    transform:scale(0.85); transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  }
  .confirm-overlay.show .confirm-box{transform:scale(1);}
  .confirm-msg{font-size:15.5px; font-weight:600; color:var(--ink); line-height:1.6; margin-bottom:20px;}
  .confirm-actions{display:flex; justify-content:flex-end; gap:10px;}
  .confirm-actions button{border-radius:10px; padding:10px 20px; font-size:14.5px; font-weight:700; cursor:pointer; border:1px solid transparent; font-family:'Nunito',sans-serif; transition:all .2s ease;}
  .btn-cancel{background:transparent; color:var(--ink-faint); border-color:var(--border);}
  .btn-cancel:hover{background:rgba(255,255,255,0.04); color:var(--ink-soft);}
  .btn-confirm{background:var(--accent-dim); color:var(--accent); border-color:rgba(79,191,184,0.4);}
  .btn-confirm:hover{background:rgba(79,191,184,0.26);}

  /* 悬浮图标按钮组 */
  .fab-cluster{
    position:fixed; right:24px; bottom:24px; display:flex; flex-direction:column; gap:12px; z-index:40;
  }
  .fab-btn{
    position:relative; width:50px; height:50px; border-radius:50%; cursor:pointer;
    border:1px solid var(--border); background:var(--card-solid);
    backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%);
    box-shadow:0 8px 24px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.08);
    color:var(--ink-soft); display:flex; align-items:center; justify-content:center;
    transition:all .3s cubic-bezier(.34,1.56,.64,1);
  }
  .fab-btn svg{width:21px;height:21px;}
  .fab-btn:active{transform:translateY(-1px) scale(0.95);}
  .fab-badge{
    display:none; position:absolute; top:-4px; right:-4px; background:var(--amber); color:#1a1206;
    font-size:11px; font-weight:800; border-radius:10px; padding:1px 6px; min-width:16px; text-align:center;
  }
  /* 三个按钮各自独立的主题色，悬停时一目了然是哪个功能 */
  .fab-check:hover{
    color:#4FBFB8; border-color:rgba(79,191,184,0.5); transform:translateY(-4px) scale(1.1);
    box-shadow:0 14px 32px rgba(0,0,0,0.5), 0 0 26px rgba(79,191,184,0.35), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .fab-clean:hover{
    color:#E3A63E; border-color:rgba(227,166,62,0.5); transform:translateY(-4px) scale(1.1);
    box-shadow:0 14px 32px rgba(0,0,0,0.5), 0 0 26px rgba(227,166,62,0.35), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .fab-trash:hover{
    color:#E5726B; border-color:rgba(229,114,106,0.5); transform:translateY(-4px) scale(1.1);
    box-shadow:0 14px 32px rgba(0,0,0,0.5), 0 0 26px rgba(229,114,106,0.35), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .fab-trash.active{
    color:#FFD9D6; border:2px solid #E5726B;
    background:linear-gradient(135deg, rgba(229,114,106,0.45), rgba(229,114,106,0.22));
    box-shadow:0 0 0 4px rgba(229,114,106,0.22), 0 6px 22px rgba(229,114,106,0.4);
    transform:translateY(-2px);
  }
</style>
</head>
<body>
<header>
  <h1>活动清单</h1>
  <div class="meta" id="last-run">正在加载…</div>
</header>
<div id="main">
  <div class="search-row">
    <button id="kw-btn" class="search-btn" onclick="toggleConfig()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <span>关键词</span>
    </button>
    <button id="refresh-btn" class="primary icon-only" onclick="runCheck()" data-tooltip="立即检查更新">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v6h-6"/></svg>
    </button>
    <div id="config-panel">
      <div class="cfg-title">关注的关键词（会自动生成新闻检索）</div>
      <div id="kw-list"></div>
      <div class="cfg-row">
        <input id="kw-input" placeholder="输入新关键词，比如：牛剑八周项目" />
        <button onclick="addKeyword()">添加</button>
      </div>
    </div>
  </div>
  <div class="toolbar">
    <button id="f-all" class="active" onclick="setFilter('all')">全部</button>
    <button id="f-unread" onclick="toggleFilter('unread')">未读</button>
    <button id="f-fav" onclick="toggleFilter('fav')">收藏</button>
  </div>

  <div id="view-label" class="view-label"><span class="dot"></span>当前查看：全部</div>
  <div id="list"></div>
</div>

<!-- 悬浮图标按钮组：全部已读 / 清理已读 / 回收站，参照常见App右下角悬浮操作的做法 -->
<div class="fab-cluster">
  <button class="fab-btn fab-check tooltip-left" onclick="askMarkAllRead()" data-tooltip="全部已读">
    <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9.5" stroke="currentColor" stroke-width="1.6" opacity="0.4"/><path d="M7 12.2l3 3L17 9" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <button class="fab-btn fab-clean tooltip-left" onclick="askCleanupRead()" data-tooltip="清理已读且未收藏">

let state = { keywords: DEFAULT_KEYWORDS.slice(), items: {}, trash: {}, lastRun: null };
let currentFilter = 'all';

async function loadState(){
  try{
    if (window.storage) {
      const res = await window.storage.get(STORAGE_KEY, false);
      if(res && res.value){
        const parsed = JSON.parse(res.value);
        state.keywords = parsed.keywords || DEFAULT_KEYWORDS.slice();
        state.items = parsed.items || {};
        state.trash = parsed.trash || {};
        state.lastRun = parsed.lastRun || null;
      }
    } else {
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const parsed = JSON.parse(raw);
        state.keywords = parsed.keywords || DEFAULT_KEYWORDS.slice();
        state.items = parsed.items || {};
        state.trash = parsed.trash || {};
        state.lastRun = parsed.lastRun || null;
      }
    }
  }catch(e){ /* 首次使用，用默认值 */ }

  // 示例数据版本控制：如果当前数据全部都是"示例数据"（不是真抓到的），
  // 且版本号跟最新的示例数据不一致，就自动换成最新这批，避免你看到的还是旧版示例
  const allItemsAreDemo = Object.keys(state.items).length > 0 &&
    Object.values(state.items).every(it => it.isDemo);
  const noItemsAtAll = Object.keys(state.items).length === 0 && Object.keys(state.trash).length === 0;
  if(noItemsAtAll || (allItemsAreDemo && state.demoVersion !== DEMO_VERSION)){
    state.items = { ...DEMO_ITEMS };
    state.demoVersion = DEMO_VERSION;
  }

  renderConfig();
  renderItems();
  updateLastRunText();
  updateTrashBadge();
  renderDiagnostics();

  // 自动检查：距上次检查超过设定小时数，静默查一次
  const now = Date.now();
  const last = state.lastRun ? new Date(state.lastRun).getTime() : 0;
  if(!last || (now - last) > AUTO_CHECK_HOURS * 3600 * 1000){
    runCheck();
  }
}

async function saveState(){
  const payload = JSON.stringify(state);
  try{
    if(window.storage){ await window.storage.set(STORAGE_KEY, payload, false); }
    else{ localStorage.setItem(STORAGE_KEY, payload); }
  }catch(e){ console.error('保存失败', e); }
}

function updateLastRunText(){
  document.getElementById('last-run').textContent = state.lastRun
    ? ('最近检查时间：' + state.lastRun)
    : '还没有检查过，点击"立即检查更新"开始';
}

function makeId(link, title){
  try{ return btoa(unescape(encodeURIComponent((link||'')+'||'+(title||'')))).slice(0,40); }
  catch(e){ return (link||'')+(title||''); }
}

// 多个中转服务，第一个失败了自动试下一个，提高成功率
const CORS_PROXIES = [
  (url) => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
  (url) => 'https://corsproxy.io/?url=' + encodeURIComponent(url),
  (url) => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url),
];

async function fetchViaProxies(targetUrl){
  let lastError = null;
  for(const buildProxyUrl of CORS_PROXIES){
    try{
      const res = await fetch(buildProxyUrl(targetUrl), { signal: AbortSignal.timeout(12000) });
      if(!res.ok) throw new Error('HTTP状态码 ' + res.status);
      const text = await res.text();
      if(!text || text.trim().length === 0) throw new Error('返回内容为空');
      return text;
    }catch(e){
      lastError = e;
      continue; // 换下一个中转服务再试
    }
  }
  throw lastError || new Error('所有中转线路均失败');
}

async function checkOneKeyword(kw){
  try{
    const rssUrl = 'https://www.bing.com/news/search?q=' + encodeURIComponent(kw) + '&format=rss';
    const text = await fetchViaProxies(rssUrl);
    const doc = new DOMParser().parseFromString(text, 'application/xml');
    if(doc.querySelector('parsererror')) throw new Error('返回内容不是有效的XML/RSS格式（前100字符：' + text.slice(0,100) + '）');
    const foundItems = doc.querySelectorAll('item');
    const parsed = [];
    foundItems.forEach(item => {
      const title = item.querySelector('title')?.textContent?.trim();
      const link = item.querySelector('link')?.textContent?.trim();
      const pubDate = item.querySelector('pubDate')?.textContent?.trim() || '';
      if(title && link) parsed.push({title, link, pubDate});
    });
    return { kw, ok: true, items: parsed, note: parsed.length===0 ? '解析成功但没有找到任何条目' : null };
  }catch(e){
    return { kw, ok: false, error: e.message };
  }
}

async function runCheck(){
  const statusEl = document.getElementById('last-run');
  const refreshBtn = document.getElementById('refresh-btn');
  refreshBtn.classList.add('spinning');
  let newCount = 0, failCount = 0;
  const errors = [];
  statusEl.textContent = '正在检查更新…（' + state.keywords.length + ' 个关键词同时进行）';

  // 所有关键词同时并行请求，而不是一个个排队等，明显加快速度
  const results = await Promise.all(state.keywords.map(kw => checkOneKeyword(kw)));

  results.forEach(r => {
    if(!r.ok){ failCount++; errors.push(r.kw + '：' + r.error); return; }
    if(r.note){ errors.push(r.kw + '：' + r.note); }
    r.items.forEach(it => {
      const id = makeId(it.link, it.title);
      if(!state.items[id]){
        // 只要有一条真实数据进来了，就清掉示例数据，不用手动管
        Object.keys(state.items).forEach(k => { if(state.items[k].isDemo) delete state.items[k]; });
        state.items[id] = {
          title: it.title, link: it.link, pubDate: it.pubDate, source: '关键词：'+r.kw,
          firstSeen: new Date().toISOString(), read:false, fav:false
        };
        newCount++;
      }
    });
  });

  state.lastRun = new Date().toISOString().slice(0,16).replace('T',' ');
  state.lastErrors = errors;
  await saveState();
  renderItems();
  updateLastRunText();
  renderDiagnostics();
  refreshBtn.classList.remove('spinning');
  showToast('检查完成，发现 ' + newCount + ' 条新内容' + (failCount ? '，' + failCount + ' 个关键词失败（详情见下方诊断信息）' : ''));
}

function renderDiagnostics(){
  let el = document.getElementById('diag-panel');
  if(!el){
    el = document.createElement('div');
    el.id = 'diag-panel';
    el.className = 'diag-panel';
    document.getElementById('main').appendChild(el);
  }
  if(!state.lastErrors || !state.lastErrors.length){
    el.classList.remove('open');
    return;
  }
  el.innerHTML = '<strong>本次检查的诊断信息：</strong><br>' + state.lastErrors.map(e=>escapeHtml(e)).join('<br>');
  const toolbarRect = document.querySelector('.toolbar').getBoundingClientRect();
  const mainRect = document.getElementById('main').getBoundingClientRect();
  el.style.top = (toolbarRect.bottom - mainRect.top + 12) + 'px';
  el.classList.add('open');
}
document.addEventListener('click', (e) => {
  const diag = document.getElementById('diag-panel');
  if(!diag || !diag.classList.contains('open')) return;
  const checkBtn = document.getElementById('refresh-btn');
  const path = e.composedPath();
  if(path.includes(diag) || (checkBtn && path.includes(checkBtn))) return;
  diag.classList.remove('open');
});

function formatDate(pubDateStr, fallbackIso){
  let d = pubDateStr ? new Date(pubDateStr) : null;
  if(!d || isNaN(d)) d = fallbackIso ? new Date(fallbackIso) : null;
  if(!d || isNaN(d)) return '未知日期';
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}/${m}/${day}`;
}

function envelopeIcon(isRead){
  // 圆圈+打勾图标，环、圆点、勾三层始终都在，靠CSS过渡平滑地互相淡入淡出/描边展开，
  // 不是整个图标跳一下，是"圆点平滑地变成勾"的感觉
  return `<svg class="check-icon ${isRead?'is-read':''}" viewBox="0 0 24 24" fill="none">
    <circle class="ring" cx="12" cy="12" r="9.2"/>
    <circle class="dot" cx="12" cy="12" r="3.4"/>
    <path class="tick" d="M7.3 12.3l3 3L16.9 8.8" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}
function starIcon(isFav){
  return `<svg class="fav-icon ${isFav?'is-fav':''}" viewBox="0 0 24 24">
    <path class="star-outline" d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z" fill="none" stroke-width="1.6"/>
    <path class="star-fill" d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"/>
  </svg>`;
}

const VIEW_LABELS = { all:'当前查看：全部', unread:'当前查看：未读', fav:'当前查看：收藏', trash:'当前查看：回收站' };
function setFilter(f){
  currentFilter = f;
  ['all','unread','fav','trash'].forEach(x=>document.getElementById('f-'+x).classList.toggle('active', x===f));
  document.getElementById('view-label').innerHTML = `<span class="dot"></span>${VIEW_LABELS[f] || ''}`;
  renderItems();
}
function toggleFilter(f){
  setFilter(currentFilter === f ? 'all' : f);
}

function applyReadVisual(id){
  const item = state.items[id];
  if(!item) { renderItems(); return; }
  const rowEl = document.querySelector(`.row[data-id="${id}"]`);
  if(!rowEl){ renderItems(); return; }
  const iconEl = rowEl.querySelector('.check-icon');
  if(iconEl) iconEl.classList.toggle('is-read', item.read);
  rowEl.classList.toggle('read', item.read);
  // 未读/收藏筛选下，状态一变这一条可能就不该再出现在当前列表里，
  // 等平滑过渡播完再重新渲染，确保筛选结果正确
  if(currentFilter === 'unread'){ setTimeout(renderItems, 420); }
}
function applyFavVisual(id, justBecameFav){
  const item = state.items[id];
  if(!item) { renderItems(); return; }
  const rowEl = document.querySelector(`.row[data-id="${id}"]`);
  if(!rowEl){ renderItems(); return; }
  const iconEl = rowEl.querySelector('.fav-icon');
  if(iconEl) iconEl.classList.toggle('is-fav', item.fav);
  if(justBecameFav){
    const starEl = rowEl.querySelector('.star');
    const bloomEl = rowEl.querySelector('.bloom');
    if(bloomEl){
      bloomEl.classList.remove('burst');
      void bloomEl.offsetWidth; // 强制重排，保证连续点击时动画能重新播放
      bloomEl.classList.add('burst');
    }
    if(starEl){
      starEl.classList.remove('bursting');
      void starEl.offsetWidth;
      starEl.classList.add('bursting');
    }
  }
  if(currentFilter === 'fav'){ setTimeout(renderItems, 420); }
}

function toggleRead(id){ state.items[id].read = !state.items[id].read; saveState(); applyReadVisual(id); }
function toggleFav(id){
  state.items[id].fav = !state.items[id].fav;
  const justBecameFav = state.items[id].fav;
  saveState(); applyFavVisual(id, justBecameFav);
}
function openItem(id, link){ state.items[id].read = true; saveState(); window.open(link,'_blank','noopener,noreferrer'); applyReadVisual(id); }

function rightClickToggle(e, id){
  e.preventDefault();
  if(!state.items[id]) return false;
  state.items[id].read = !state.items[id].read;
  const nowRead = state.items[id].read;
  saveState(); applyReadVisual(id);
  showToast(nowRead ? '已标记为已读' : '已标记为未读');
  return false;
}

// ---------- 通用确认弹窗 ----------
let pendingConfirmAction = null;
function showConfirm(msg, onConfirm){
  pendingConfirmAction = onConfirm;
  document.getElementById('confirm-msg').textContent = msg;
  document.getElementById('confirm-overlay').classList.add('show');
}
function confirmOk(){
  document.getElementById('confirm-overlay').classList.remove('show');
  if(pendingConfirmAction) pendingConfirmAction();
  pendingConfirmAction = null;
}
function confirmCancel(){
  document.getElementById('confirm-overlay').classList.remove('show');
  pendingConfirmAction = null;
}

function askMarkAllRead(){
  showConfirm('确定要将全部内容标记为已读吗？', () => {
    Object.values(state.items).forEach(it => it.read = true);
    saveState(); renderItems();
    showToast('已全部标记为已读');
  });
}
function askCleanupRead(){
  const targets = Object.entries(state.items).filter(([id,it]) => it.read && !it.fav);
  if(!targets.length){ showToast('没有"已读且未收藏"的内容需要清理'); return; }
  showConfirm(`确定要删除 ${targets.length} 条已读且未收藏的内容吗？（会移入回收站，可以恢复）`, () => {
    targets.forEach(([id]) => moveToTrash(id, false, true));
    saveState();
    renderItems();
    showToast(`已清理 ${targets.length} 条内容到回收站`);
  });
}

// ---------- 删除 / 回收站 ----------
function deleteItem(id, evt){
  const rowEl = evt ? evt.target.closest('.row') : null;
  const trashBtn = document.getElementById('f-trash');
  if(rowEl && trashBtn){
    flyToTrash(rowEl, trashBtn, () => { moveToTrash(id, true); });
  } else {
    moveToTrash(id, true);
  }
}
function flyToTrash(rowEl, trashBtn, onDone){
  const rowRect = rowEl.getBoundingClientRect();
  const trashRect = trashBtn.getBoundingClientRect();
  const clone = rowEl.cloneNode(true);
  clone.style.position = 'fixed';
  clone.style.left = rowRect.left + 'px';
  clone.style.top = rowRect.top + 'px';
  clone.style.width = rowRect.width + 'px';
  clone.style.margin = 0;
  clone.style.zIndex = 300;
  clone.style.pointerEvents = 'none';
  clone.style.transition = 'transform .6s cubic-bezier(.22,1,.36,1), opacity .5s ease .1s, border-radius .6s ease';
  clone.style.willChange = 'transform, opacity';
  document.body.appendChild(clone);

  // 原来的位置平滑塌陷收起，避免列表重新渲染时位置突然跳一下
  rowEl.style.overflow = 'hidden';
  rowEl.style.transition = 'max-height .4s ease .15s, opacity .25s ease, margin .4s ease .15s, padding .4s ease .15s';
  rowEl.style.maxHeight = rowEl.getBoundingClientRect().height + 'px';
  rowEl.style.opacity = '0';
  requestAnimationFrame(() => {
    rowEl.style.maxHeight = '0px';
    rowEl.style.marginBottom = '0px';
    rowEl.style.paddingTop = '0px';
    rowEl.style.paddingBottom = '0px';
  });

  const dx = (trashRect.left + trashRect.width/2) - (rowRect.left + rowRect.width/2);
  const dy = (trashRect.top + trashRect.height/2) - (rowRect.top + rowRect.height/2);

  requestAnimationFrame(() => {
    clone.style.transform = 'scale(1.03)';
    requestAnimationFrame(() => {
      clone.style.transform = `translate(${dx}px, ${dy}px) scale(0.12) rotate(10deg)`;
      clone.style.opacity = '0';
      clone.style.borderRadius = '50%';
    });
  });
  setTimeout(() => {
    clone.remove();
    onDone();
  }, 650);
}
function moveToTrash(id, doRender, skipSave){
  const item = state.items[id];
  if(!item) return;
  delete state.items[id];
  state.trash[id] = { ...item, deletedAt: new Date().toISOString() };
  if(!skipSave) saveState();
  updateTrashBadge();
  if(doRender){ renderItems(); showToast('已移入回收站'); }
}
function restoreItem(id){
  const rowEl = document.getElementById('trash-row-' + id);
  const doRestore = () => {
    const item = state.trash[id];
    if(!item) return;
    delete state.trash[id];
    delete item.deletedAt;
    state.items[id] = item;
    saveState(); renderItems(); updateTrashBadge();
    showToast('已恢复');
  };
  if(rowEl){
    rowEl.classList.add('restoring');
    setTimeout(doRestore, 300);
  } else {
    doRestore();
  }
}
function updateTrashBadge(){
  const badge = document.getElementById('trash-badge');
  const count = Object.keys(state.trash).length;
  if(count > 0){ badge.style.display = 'inline-block'; badge.textContent = count; }
  else{ badge.style.display = 'none'; }
}

function renderItems(){
  if(currentFilter === 'trash'){
    renderTrashView();
    return;
  }
  let list = Object.entries(state.items).map(([id,v])=>({id,...v}));
  list.sort((a,b)=> (b.pubDate||b.firstSeen||'').localeCompare(a.pubDate||a.firstSeen||''));
  if(currentFilter==='unread') list = list.filter(it=>!it.read);
  if(currentFilter==='fav') list = list.filter(it=>it.fav);

  const container = document.getElementById('list');
  if(!list.length){
    container.innerHTML = '<div class="empty-state">这里暂时没有内容，点击"立即检查更新"试试</div>';
    return;
  }
  container.innerHTML = list.map(it => `
    <div class="row ${it.read?'read':''}" data-id="${it.id}" oncontextmenu="return rightClickToggle(event,'${it.id}')">
      <span class="envelope" onclick="toggleRead('${it.id}')" title="标记已读/未读（右键点击本行也可以切换）">${envelopeIcon(it.read)}</span>
      <div class="title-wrap">
        <a href="${escapeHtml(it.link)}" onclick="openItem('${it.id}','${escapeHtml(it.link)}'); return false;">${escapeHtml(it.title)}</a>
        <div class="src">${escapeHtml(it.source||'')}</div>
      </div>
      <span class="date">${formatDate(it.pubDate, it.firstSeen)}</span>
      <span class="star" onclick="toggleFav('${it.id}')" title="收藏/取消收藏">${starIcon(it.fav)}<span class="bloom"><span class="ring"></span><i></i><i></i><i></i><i></i><i></i><i></i><i class="spark"></i><i class="spark"></i><i class="spark"></i><i class="spark"></i></span></span>
      <span class="del-btn" onclick="deleteItem('${it.id}', event)" title="删除这条（会移入回收站）">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path class="bin-body" d="M6 10v9a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-9"/>
          <path class="bin-body" d="M10 13.5v4.5M14 13.5v4.5"/>
          <g class="bin-lid"><path d="M4 7h16"/><path d="M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></g>
        </svg>
      </span>
    </div>
  `).join('');
}

function renderTrashView(){
  const list = Object.entries(state.trash).map(([id,v])=>({id,...v}))
    .sort((a,b)=> (b.deletedAt||'').localeCompare(a.deletedAt||''));
  const container = document.getElementById('list');
  if(!list.length){
    container.innerHTML = '<div class="empty-state">回收站是空的</div>';
    return;
  }
  container.innerHTML = list.map(it => `
    <div class="row trash-row" id="trash-row-${it.id}">
      <span class="envelope" style="opacity:0.5;">${envelopeIcon(true)}</span>
      <div class="title-wrap">
        <a href="${escapeHtml(it.link)}" target="_blank" rel="noopener noreferrer" style="color:var(--ink-soft);">${escapeHtml(it.title)}</a>
        <div class="src">${escapeHtml(it.source||'')} · 已删除</div>
      </div>
      <span class="date">${formatDate(it.pubDate, it.firstSeen)}</span>
      <span class="restore-btn" onclick="restoreItem('${it.id}')" title="恢复这条">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
      </span>
    </div>
  `).join('');
}

function renderConfig(){
  document.getElementById('kw-list').innerHTML = state.keywords.map((k,i)=>`
    <div class="cfg-row"><span style="flex:1;font-size:12px;">${escapeHtml(k)}</span>
      <button onclick="removeKeyword(${i})">删除</button></div>
  `).join('');
}
function addKeyword(){
  const input = document.getElementById('kw-input');
  const v = input.value.trim();
  if(!v) return;
  state.keywords.push(v);
  input.value='';
  saveState(); renderConfig();
}
function removeKeyword(i){ state.keywords.splice(i,1); saveState(); renderConfig(); }
function toggleConfig(){
  const panel = document.getElementById('config-panel');
  const btn = document.getElementById('kw-btn');
  const isOpening = !panel.classList.contains('open');
  panel.classList.toggle('open');
  btn.classList.toggle('active', isOpening);
  if(isOpening){
    const btnRect = btn.getBoundingClientRect();
    const toolbarRect = document.querySelector('.search-row').getBoundingClientRect();
    const btnLeftInToolbar = btnRect.left - toolbarRect.left;
    panel.style.left = btnLeftInToolbar + 'px';
    panel.style.setProperty('--pointer-left', (btnRect.width/2 - 6) + 'px');
  }
}

function escapeHtml(str){
  return (str||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
let toastTimer=null;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 3500);
}

// 光源跟随鼠标：鼠标在按钮上移动时，实时更新光斑位置
document.addEventListener('mousemove', (e) => {
  const btn = e.target.closest('button');
  if(btn){
    const rect = btn.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 100;
    const y = ((e.clientY - rect.top) / rect.height) * 100;
    btn.style.setProperty('--mx', x + '%');
    btn.style.setProperty('--my', y + '%');
  }
});

// 点击弹出框以外的地方，自动收起弹出框
document.addEventListener('click', (e) => {
  const panel = document.getElementById('config-panel');
  const btn = document.getElementById('kw-btn');
  if(!panel.classList.contains('open')) return;
  // 用composedPath而不是contains判断：删除关键词等操作会重建弹窗内部的DOM，
  // 此时被点击的按钮已经从文档里被移除，contains()会误判成"点在了外面"，
  // composedPath记录的是点击发生那一刻的真实路径，不受后续DOM重建影响
  const path = e.composedPath();
  if(path.includes(panel) || path.includes(btn)) return;
  panel.classList.remove('open');
  btn.classList.remove('active');
});

loadState();
</script>
